name: Mimari3D Web (GitHub Pages)

# Bağımsız DXF->3B/PDF web sayfasını derler ve GitHub Pages'e yayınlar.
# Yayın adresi (proje sitesi): https://<kullanici>.github.io/<depo>/
#
# YÖNTEM: Derlenen statik site (web3d/dist) doğrudan "gh-pages" dalına push edilir.
# GitHub'ın "actions/deploy-pages" backend'i bu depoda ısrarla "Deployment failed,
# try again later" verdiği için dala-dayalı (branch) yayın kullanıyoruz — çok daha
# güvenilir.
#
# TEK SEFERLİK AYAR: Settings -> Pages -> "Build and deployment" ->
#   Source: "Deploy from a branch"
#   Branch: "gh-pages"  /  klasör: "/ (root)"
# Bir kez seçildikten sonra her push otomatik yayınlanır.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web3d/**"
      - ".github/workflows/web3d.yml"

# gh-pages dalına yazabilmek için.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web3d/package-lock.json

      - name: Bağımlılıkları yükle
        working-directory: web3d
        run: npm ci

      - name: Tip denetimi
        working-directory: web3d
        run: npm run typecheck

      - name: Derle
        working-directory: web3d
        run: npm run build

      - name: Jekyll'i devre dışı bırak
        run: touch web3d/dist/.nojekyll

      - name: gh-pages dalına yayınla
        working-directory: web3d/dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy web3d to GitHub Pages ($GITHUB_SHA)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
