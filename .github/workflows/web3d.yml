name: Site + Mimari3D Web (GitHub Pages)

# İki statik uygulamayı derleyip tek GitHub Pages sitesi olarak yayınlar:
#   /        -> site/   (Gökten Mimarlık 3B animasyonlu tanıtım sitesi)
#   /viewer/ -> web3d/  (DXF -> 3B model / A3 PDF aracı)
# Yayın adresi (proje sitesi): https://<kullanici>.github.io/<depo>/
#
# YÖNTEM: Derlenen statik site doğrudan "gh-pages" dalına push edilir.
# GitHub'ın "actions/deploy-pages" backend'i bu depoda ısrarla "Deployment failed,
# try again later" verdiği için dala-dayalı (branch) yayın kullanıyoruz — çok daha
# güvenilir.
#
# TEK SEFERLİK AYAR: Settings -> Pages -> "Build and deployment" ->
#   Source: "Deploy from a branch"
#   Branch: "gh-pages"  /  klasör: "/ (root)"
# Bir kez seçildikten sonra her push otomatik yayınlanır.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "web3d/**"
      - ".github/workflows/web3d.yml"

# gh-pages dalına yazabilmek için.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            web3d/package-lock.json

      - name: Tanıtım sitesi — bağımlılıklar
        working-directory: site
        run: npm ci

      - name: Tanıtım sitesi — tip denetimi
        working-directory: site
        run: npm run typecheck

      - name: Tanıtım sitesi — derle
        working-directory: site
        run: npm run build

      - name: Web3D aracı — bağımlılıklar
        working-directory: web3d
        run: npm ci

      - name: Web3D aracı — tip denetimi
        working-directory: web3d
        run: npm run typecheck

      - name: Web3D aracı — derle
        working-directory: web3d
        run: npm run build

      - name: Siteyi birleştir (kök: site, /viewer: web3d)
        run: |
          mv web3d/dist site/dist/viewer
          touch site/dist/.nojekyll

      - name: gh-pages dalına yayınla
        working-directory: site/dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy site + web3d to GitHub Pages ($GITHUB_SHA)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
